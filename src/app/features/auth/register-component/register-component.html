<div class="auth-container">
  <div class="auth-layout">
    <!-- Section gauche avec image -->
    <div class="auth-image">
      <img
        src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=600&h=700&fit=crop"
        alt="E-learning illustration"
      />
    </div>

    <!-- Section droite avec formulaire -->
    <div class="auth-form-section">
      <form class="auth-form" (ngSubmit)="onSubmit()">
        <!-- Boutons radio Étudiant/Professeur -->
        <div class="user-type">
          <label class="radio-btn">
            <input type="radio" name="userType" [(ngModel)]="userType" value="etudiant" required />
            <span>Étudiant</span>
          </label>

          <label class="radio-btn">
            <input
              type="radio"
              name="userType"
              [(ngModel)]="userType"
              value="professeur"
              required
            />
            <span>Professeur</span>
          </label>
        </div>

        <input
          [(ngModel)]="firstName"
          type="text"
          name="firstName"
          class="form-input"
          placeholder="Prénom"
          required
        />
        <input
          [(ngModel)]="lastName"
          type="text"
          name="lastName"
          class="form-input"
          placeholder="Nom"
          required
        />
        <input
          [(ngModel)]="email"
          type="email"
          name="email"
          class="form-input"
          placeholder="E-mail"
          required
        />
        <input
          [(ngModel)]="profession"
          type="text"
          name="profession"
          class="form-input"
          placeholder="Profession"
          required
        />
        <input
          [(ngModel)]="password"
          type="password"
          name="password"
          class="form-input"
          placeholder="Mot-de-passe"
          required
        />

        <button type="submit" class="submit-btn">S'inscrire</button>
      </form>

      <!-- Lien pour aller vers connexion -->
      <div class="switch-link">
        <p>Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
      </div>
    </div>
  </div>
</div>
